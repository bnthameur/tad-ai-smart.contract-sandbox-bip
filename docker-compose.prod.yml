version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tad_sandbox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # FastAPI Backend
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/tad_sandbox
      - REDIS_URL=redis://redis:6379/0
      - RPC_URL_MAINNET=${RPC_URL_MAINNET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      # ... other API keys
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker (runs the analysis)
  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/tad_sandbox
      - REDIS_URL=redis://redis:6379/0
      - RPC_URL_MAINNET=${RPC_URL_MAINNET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    depends_on:
      - postgres
      - redis
    command: celery -A app.workers.celery_worker worker --loglevel=info --concurrency=2

  # Celery Beat (optional, for scheduled tasks)
  # beat:
  #   build:
  #     context: ..
  #     dockerfile: backend/Dockerfile
  #   environment:
  #     - REDIS_URL=redis://redis:6379/0
  #   depends_on:
  #     - redis
  #   command: celery -A app.workers.celery_worker beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
